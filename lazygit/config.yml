gui:
  nerdFontsVersion: "3"
  theme:
    # active border: leave default (green + bold)
    # inactive panels recede into hunk's inert line-number color
    inactiveBorderColor:
      - "#485163"
    # selected item bg: hue + saturation of the inactive border (#485163), at a
    # darker lightness so text stays legible — HSL(220, 16%, 26%)
    # (terminals have no real alpha, so this is a pre-blended opaque color)
    selectedLineBgColor:
      - "#383F4D"
    selectedRangeBgColor:
      - "#383F4D"

git:
  # lazygit renders the log views (all-branches `<` and per-branch log) in a PTY
  # with GIT_PAGER set to the active diff pager (hunk). hunk only colorizes diffs
  # and strips ANSI from plain `git log`, so these views lost their color.
  # `git --no-pager` makes git ignore GIT_PAGER and emit color directly; diffs are
  # unaffected (they don't use these commands). See lazygit pkg/gui/pty.go.
  allBranchesLogCmds:
    - git --no-pager log --graph --all --color=always --abbrev-commit --decorate --date=relative --pretty=medium
  branchLogCmd: git --no-pager log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium {{branchName}} --
  pagers:
    - colorArg: always
      pager: hunk pager
    - {}
