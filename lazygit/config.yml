# Skip the "Press ENTER to return to lazygit" pause after a subprocess (e.g.
# quitting fresh) — fresh owns the screen, so there's no output to read.
promptToReturnFromSubprocess: false

os:
  # fresh isn't a built-in editPreset, so wire it manually. `e` on a file uses
  # `edit`; `e` in the diff view uses `editAtLine` to jump to the hovered line
  # (fresh accepts file:line:col). editInTerminal suspends lazygit so the TUI
  # editor gets the terminal, then resumes when fresh exits (it blocks like nano).
  edit: fresh {{filename}}
  editAtLine: "fresh {{filename}}:{{line}}"
  editAtLineAndWait: "fresh {{filename}}:{{line}}"
  openDirInEditor: fresh {{dir}}
  editInTerminal: true

gui:
  nerdFontsVersion: "3"
  theme:
    # active border: leave default (green + bold)
    # inactive panels recede into hunk's inert line-number color
    inactiveBorderColor:
      - "#485163"
    # selected item bg: hue + saturation of the inactive border (#485163), at a
    # darker lightness so text stays legible — HSL(220, 16%, 26%)
    # (terminals have no real alpha, so this is a pre-blended opaque color)
    selectedLineBgColor:
      - "#383F4D"
    selectedRangeBgColor:
      - "#383F4D"

git:
  # Both log views (all-branches `<` and per-branch log) call git-pretty-log
  # (~/.local/bin, stowed from dot-local/), which runs `git log --graph` and pipes
  # it through perl to swap the ASCII graph glyphs for box-drawing chars
  # (| * / \ -> │ ● ╱ ╲). The pipe MUST live in a script, not here: lazygit runs
  # these via str.ToArgv (argv exec, no shell), so a `| perl` written inline would
  # become a literal git arg. The script also handles `--no-pager` (lazygit sets
  # GIT_PAGER=hunk, which strips ANSI from `git log` and kills the color).
  # The trailing `--` is git's ref/pathspec separator (lazygit's own default), not
  # option-forwarding — it disambiguates {{branchName}} from a same-named file.
  allBranchesLogCmds:
    - git-pretty-log --all
  branchLogCmd: git-pretty-log {{branchName}} --
  pagers:
    - colorArg: always
      pager: hunk pager --no-hunk-headers --no-line-numbers
    # Absolute bun path, not bare `bun`: the latter hits the socket-firewall shim
    # (sfw) on PATH. git runs GIT_PAGER via `sh -c`, so $HOME expands here.
    - colorArg: always
      pager: $HOME/.bun/bin/bun run $HOME/dev/floss/hunk/src/main.tsx -- pager --no-hunk-headers --no-line-numbers
    # Semantic quick-check pager (cycle with `|`): sem (github.com/Ataraxy-Labs/sem)
    # shows entity-level changes (functions/classes/headings) instead of raw
    # hunks — a fast "what changed", not a staging view. colorArg: never, unlike
    # the hunk entries above: sem's --patch parser rejects ANSI-colored input, so
    # it takes raw diff and re-colors itself. sem-pager (dot-local/bin) guards the
    # empty/unparseable input lazygit pipes through verbatim. {{columnWidth}} is
    # lazygit's InnerWidth/2-6 (see its pager_config.go), so sem-pager computes the
    # full pane width as 2*columnWidth+12 (capped 120) to size its header rules.
    - colorArg: never
      pager: sem-pager {{columnWidth}}

# Keybindings use the 0.62+ syntax: canonical <ctrl+x> tokens, arrays to bind
# several keys to one action, and <disabled> to remove one. On macOS <meta+...>
# is the ⌘ key (Ghostty forwards it).
keybinding:
  universal:
    # Drop <ctrl+d> from scroll-down-main (default [<pgdown>, J, <ctrl+d>]) to
    # free it for the working-tree Hunk command below. <pgdown> and J still
    # scroll the main view, as do the arrows when it's focused.
    scrollDownMain: [<pgdown>, J]
    # Filtering (path/author menu) moved off <ctrl+s> -> <ctrl+f> so <ctrl+s>
    # can drive staged Hunk below. <ctrl+f>'s old owner (findBaseCommitForFixup)
    # is disabled.
    filteringMenu: <ctrl+f>
    # Submit commit message: keep ⌘+enter (the Mac default) plus ctrl+enter, and
    # drop the default <ctrl+s> alternative so <ctrl+s> is free for staged Hunk.
    confirmInEditor: [<meta+enter>, <ctrl+enter>]
  files:
    # No fixup workflow here; freed so <ctrl+f> is clean for filtering above.
    # (Single config key, so this also removes it from the commits context.)
    findBaseCommitForFixup: <disabled>

customCommands:
  # Open the full Hunk TUI, auto-reloading as files change. output: terminal
  # suspends lazygit and hands hunk the screen; on quit it returns immediately
  # (promptToReturnFromSubprocess is false; clean exit = 0).
  - key: <ctrl+d>   # freed above (default scroll-down-main otherwise)
    context: global
    description: Review working tree in Hunk (--watch)
    command: hunk diff --watch
    output: terminal
  - key: <ctrl+s>   # freed above (default filteringMenu + confirmInEditor alt)
    context: global
    description: Review staged changes in Hunk (--watch --staged)
    command: hunk diff --watch --staged
    output: terminal
