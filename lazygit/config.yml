gui:
  nerdFontsVersion: "3"
  theme:
    # active border: leave default (green + bold)
    # inactive panels recede into hunk's inert line-number color
    inactiveBorderColor:
      - "#485163"
    # selected item bg: hue + saturation of the inactive border (#485163), at a
    # darker lightness so text stays legible — HSL(220, 16%, 26%)
    # (terminals have no real alpha, so this is a pre-blended opaque color)
    selectedLineBgColor:
      - "#383F4D"
    selectedRangeBgColor:
      - "#383F4D"

git:
  # Both log views (all-branches `<` and per-branch log) call git-pretty-log
  # (~/.local/bin, stowed from dot-local/), which runs `git log --graph` and pipes
  # it through perl to swap the ASCII graph glyphs for box-drawing chars
  # (| * / \ -> │ ● ╱ ╲). The pipe MUST live in a script, not here: lazygit runs
  # these via str.ToArgv (argv exec, no shell), so a `| perl` written inline would
  # become a literal git arg. The script also handles `--no-pager` (lazygit sets
  # GIT_PAGER=hunk, which strips ANSI from `git log` and kills the color).
  # The trailing `--` is git's ref/pathspec separator (lazygit's own default), not
  # option-forwarding — it disambiguates {{branchName}} from a same-named file.
  allBranchesLogCmds:
    - git-pretty-log --all
  branchLogCmd: git-pretty-log {{branchName}} --
  pagers:
    - colorArg: always
      pager: hunk pager --no-hunk-headers --no-line-numbers
    - {}
