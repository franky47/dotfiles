services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "10000:8080"
    environment:
      - OPENAI_API_BASE_URLS=http://host.docker.internal:10001/v1
      - OPENAI_API_KEYS=sk-not-needed
      - ENABLE_OLLAMA_API=false
      - AIOHTTP_CLIENT_TIMEOUT_MODEL_LIST=60
      - WEBUI_AUTH=False
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.local/share/open-webui:/app/backend/data
