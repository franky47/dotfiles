healthCheckTimeout: 300
startPort: 10002

# Every model pins `proxy` to 127.0.0.1: llama.cpp b9730 (2026-06-20) binds
# llama-server to IPv4 127.0.0.1, but this host resolves `localhost` to ::1 only,
# so llama-swap's default `http://localhost:${PORT}` upstream cannot connect and the
# model hangs in "starting" until healthCheckTimeout. Pinning IPv4 sidesteps it.

models:

  qwen3.6-35b-a3b-q4_k_m:
    # 524288: 512k shared KV (256k per agent, 2 agents)
    cmd: |
      llama-server
        -hf unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_M
        --port ${PORT}
        --parallel 2
        --cont-batching
        --cache-reuse 256
        --flash-attn on
        --cache-type-k q4_0
        --cache-type-v q4_0
        --ctx-size 524288
        --gpu-layers all
        --reasoning-format deepseek
        --chat-template-kwargs '{"preserve_thinking":true}'
    proxy: http://127.0.0.1:${PORT}
    ttl: 0
    concurrencyLimit: 2

  qwen3.6-27b-q4_k_xl:
    cmd: |
      llama-server
        -hf unsloth/Qwen3.6-27B-GGUF:UD-Q4_K_XL
        --port ${PORT}
        --parallel 1
        --cont-batching
        --cache-reuse 256
        --flash-attn on
        --ctx-size 262144
        --gpu-layers all
        --reasoning-format deepseek
        --chat-template-kwargs '{"preserve_thinking":true}'
    proxy: http://127.0.0.1:${PORT}
    ttl: 0
    concurrencyLimit: 1

  # Fork of qwen3.6-27b-q4_k_xl at higher fidelity for A/B.
  # KLD vs full precision: 0.0234 (Q6_K_XL) vs 0.0666 (Q4_K_XL) — ~2.85x closer.
  # 25.6 GB vs 17.6 GB; the sweet spot before Q8's diminishing returns.
  qwen3.6-27b-q6_k_xl:
    cmd: |
      llama-server
        -hf unsloth/Qwen3.6-27B-GGUF:UD-Q6_K_XL
        --port ${PORT}
        --parallel 1
        --cont-batching
        --cache-reuse 256
        --flash-attn on
        --ctx-size 262144
        --gpu-layers all
        --reasoning-format deepseek
        --chat-template-kwargs '{"preserve_thinking":true}'
    proxy: http://127.0.0.1:${PORT}
    ttl: 0
    concurrencyLimit: 1

  ornith-1.0-35b-q4_k_m:
    # Qwen3.5-MoE arch (256 experts, 8 active), reasoning model emitting <think> blocks.
    # Native ctx 262144: --parallel 2 over 524288 gives each agent the full 256k.
    # Recommended sampling (left to client): temp 0.6, top-p 0.95, top-k 20.
    cmd: |
      llama-server
        -hf deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M
        --port ${PORT}
        --parallel 2
        --cont-batching
        --cache-reuse 256
        --flash-attn on
        --cache-type-k q4_0
        --cache-type-v q4_0
        --ctx-size 524288
        --gpu-layers all
        --reasoning-format deepseek
        --chat-template-kwargs '{"preserve_thinking":true}'
    proxy: http://127.0.0.1:${PORT}
    ttl: 0
    concurrencyLimit: 2

  gemma4-31b-q4_k_m:
    # Gemma 4 on Metal: flash-attn must be OFF (mixed SWA layout breaks Metal FA);
    # KV-cache quant requires FA so it cannot be used here. Sampling per Google docs.
    # enable_thinking:false — 31B has optional thinking mode; disable for direct answers.
    cmd: |
      llama-server
        -hf unsloth/gemma-4-31B-it-GGUF:Q4_K_M
        --port ${PORT}
        --parallel 1
        --cont-batching
        --ctx-size 131072
        --gpu-layers 99
        --jinja
        --chat-template-kwargs '{"enable_thinking":false}'
        --temp 1.0 --top-p 0.95 --top-k 64
    proxy: http://127.0.0.1:${PORT}
    ttl: 0
    concurrencyLimit: 1

  lfm2.5-8b-a1b:
    # --chat-template-file: works around a llama.cpp tool-parser bug (as of b9200).
    # llama.cpp selects its LFM2.5 tool-call parser by scanning the template source
    # for the literal "List of tools: [", but the stock GGUF template builds that string
    # at render time ("List of tools: " + tools|tojson), so detection misses and tool
    # calls fail to parse (HTTP 500). The override is the stock template plus a one-line
    # Jinja comment carrying that literal — zero render change, just trips the detector.
    cmd: |
      llama-server
        -hf LiquidAI/LFM2.5-8B-A1B-GGUF
        --port ${PORT}
        --parallel 8
        --cont-batching
        --cache-reuse 256
        --flash-attn on
        --ctx-size 524288
        --gpu-layers all
        --reasoning-format deepseek
        --chat-template-file ${env.HOME}/.config/llama-swap/lfm2.5-tool-fix.jinja
        --chat-template-kwargs '{"preserve_thinking":true}'
    proxy: http://127.0.0.1:${PORT}
    ttl: 0
    concurrencyLimit: 8

groups:
  # Keep Ornith resident so opencode's small_model (title/summary gen) hits it
  # instead of the 27B's single --parallel 1 slot (which 429s under concurrency).
  # persistent: survives a 27B's exclusive (default-group) load; exclusive: false:
  # title-gen requests don't unload the active 27B. The 27B quants stay ungrouped
  # (default swap+exclusive), so they keep full 256k ctx at --parallel 1.
  ornith-titlegen:
    persistent: true
    exclusive: false
    swap: false
    members:
      - ornith-1.0-35b-q4_k_m
