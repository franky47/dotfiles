set -g mouse on

# macOS: route shell through reattach-to-user-namespace so Keychain (Claude Code
# auth) and pbcopy/pbpaste reach tmux panes. No-op where the binary is absent.
if-shell "command -v reattach-to-user-namespace" \
  'set -g default-command "reattach-to-user-namespace -l $SHELL"; \
   bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"; \
   bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"'

# Use C-x as prefix
unbind C-b
set -g prefix C-x
bind C-x send-prefix

# Split panes: - horizontal (top/bottom), i vertical (left/right)
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind i split-window -h -c "#{pane_current_path}"

# New window: n
unbind c
bind n new-window -c "#{pane_current_path}"

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# don't rename windows automatically, use "C-x ," to rename a window.
set-option -g allow-rename off
