set -g mouse on

# Inbound OSC 52 (client → tmux paste). Outbound emission is done by the
# mouse bind below: tmux 3.6a's `load-buffer -w -` silently no-ops on this
# build even with set-clipboard=on and client termfeatures advertising
# `clipboard`, so we bypass it and write OSC 52 to the client tty directly.
set -g set-clipboard on
set -as terminal-features ',*:clipboard'

# Forward the extended keyboard protocol so modifier combos survive tmux — e.g.
# lazygit 0.62+ binds ⌘/ctrl+enter to submit a commit message. extkeys tells
# tmux the outer terminal (Ghostty) speaks the protocol; extended-keys on passes
# those keys to apps that request them. Without this, tmux strips them.
set -as terminal-features ',*:extkeys'
set -g extended-keys on

# macOS: route shell through reattach-to-user-namespace so Keychain (Claude Code
# auth) and pbcopy/pbpaste reach tmux panes. No-op where the binary is absent.
if-shell "command -v reattach-to-user-namespace" \
  'set -g default-command "reattach-to-user-namespace -l $SHELL"'

# Mouse-selection copy: pbcopy fills the echo-local clipboard (no-op
# without the binary), then a raw OSC 52 escape is written to the attached
# client's tty so the client machine's clipboard (Ghostty/iTerm2 on a
# mosh/SSH client) receives the selection too. Direct-tty form replaces
# `tmux load-buffer -w -`, which silently no-ops on tmux 3.6a here.
bind -T copy-mode MouseDragEnd1Pane {
  send-keys -X copy-pipe-no-clear "reattach-to-user-namespace pbcopy 2>/dev/null || pbcopy 2>/dev/null || true"
  send-keys -X copy-pipe-and-cancel "base64 | tr -d '\\n' | awk '{printf \"\\033]52;c;%s\\a\", $0}' > '#{client_tty}'"
}
bind -T copy-mode-vi MouseDragEnd1Pane {
  send-keys -X copy-pipe-no-clear "reattach-to-user-namespace pbcopy 2>/dev/null || pbcopy 2>/dev/null || true"
  send-keys -X copy-pipe-and-cancel "base64 | tr -d '\\n' | awk '{printf \"\\033]52;c;%s\\a\", $0}' > '#{client_tty}'"
}

# Use C-x as prefix
unbind C-b
set -g prefix C-x
bind C-x send-prefix

# Split panes: - horizontal (top/bottom), i vertical (left/right)
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind i split-window -h -c "#{pane_current_path}"

# New window: n
unbind c
bind n new-window -c "#{pane_current_path}"

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# don't rename windows automatically, use "C-x ," to rename a window.
set-option -g allow-rename off
